[supervisord]
nodaemon=true
user=root

[program:xvfb]
command=Xvfb :99 -screen 0 1280x800x16
autorestart=true

[program:fluxbox]
command=fluxbox
environment=DISPLAY=":99"
autorestart=true

[program:planner]
command=python3 /app/planner.py
environment=DISPLAY=":99"
autorestart=true

[program:x11vnc]
command=x11vnc -display :99 -forever -shared -nopw -listen 127.0.0.1 -port 5900
autorestart=true

[program:novnc]
command=websockify --web /usr/share/novnc 10000 127.0.0.1:5900
autorestart=true
